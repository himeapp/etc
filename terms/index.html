<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Terms & Conditions — Mantra Reminder</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, sans-serif; line-height: 1.55; max-width: 42rem; margin: 2rem auto; padding: 0 1.25rem; }
    nav { margin-bottom: 1.25rem; font-size: 0.95rem; }
    #content h1 { font-size: 1.75rem; margin-top: 0; }
    #content h2 { font-size: 1.15rem; margin-top: 1.75rem; }
    #content h3 { font-size: 1.05rem; margin-top: 1.25rem; }
    #content hr { border: none; border-top: 1px solid #ccc; margin: 2rem 0; }
    #content ul { padding-left: 1.25rem; }
    a { color: inherit; }
  </style>
</head>
<body>
  <nav><a href="../terms/"><strong>Terms</strong></a> · <a href="../privacy/">Privacy</a></nav>
  <main id="content">Loading…</main>
  <script src="../assets/marked.min.js"></script>
  <script>
    function siblingMdUrl(name) {
      var p = location.pathname.replace(/\/index\.html$/i, '');
      if (!p.endsWith('/')) p += '/';
      return new URL('../' + name, location.origin + p).href;
    }
    fetch(siblingMdUrl('TERMS.md'))
      .then(function (r) {
        if (!r.ok) throw new Error(String(r.status));
        return r.text();
      })
      .then(function (text) {
        if (typeof marked === 'undefined' || !marked.parse) throw new Error('marked');
        document.getElementById('content').innerHTML = marked.parse(text);
      })
      .catch(function () {
        document.getElementById('content').innerHTML = '<p>문서를 불러오지 못했습니다. <a href="https://github.com/himeapp/etc/blob/main/TERMS.md">GitHub에서 TERMS.md 보기</a></p>';
      });
  </script>
</body>
</html>
