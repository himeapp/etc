<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>himeapp — who</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, sans-serif; max-width: 38rem; margin: 3rem auto; padding: 0 1.25rem; line-height: 1.65; }
    a { color: inherit; }
    .apps { display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem; }
    .app { border: 1px solid rgba(128,128,128,.25); border-radius: .75rem; padding: 1rem 1.25rem; }
    .app h3 { margin: 0 0 .25rem; }
    .app p { margin: 0; font-size: .9rem; opacity: .75; }
    .app .links { margin-top: .5rem; font-size: .85rem; }
    .app .links a { margin-right: .75rem; opacity: .6; }
    .app .links a:hover { opacity: 1; }
    footer { margin-top: 3rem; font-size: .85rem; opacity: .45; }
  </style>
</head>
<body>
  <h1 style="margin-top:0; font-size:1.5rem;">himeapp</h1>
  <p>독립 개발자 김진영이 만드는 앱들.</p>

  <div class="apps">
    <div class="app">
      <h3>TodoLock</h3>
      <p>할 일을 끝내야 열리는 앱 잠금. 집중력을 방해하는 앱을 스스로 차단하세요.</p>
      <div class="links">
        <a href="/todolock/terms/">이용약관</a>
        <a href="/todolock/privacy/">개인정보처리방침</a>
      </div>
    </div>
    <div class="app">
      <h3>Mantra Reminder</h3>
      <p>나만의 만트라를 매일 알림으로 받아보는 마음 챙김 앱.</p>
      <div class="links">
        <a href="/terms/">이용약관</a>
        <a href="/privacy/">개인정보처리방침</a>
      </div>
    </div>
  </div>

  <footer>📧 himeggim@gmail.com</footer>
</body>
</html>
